{% extends 'ui/base.html' %}
{% block title %}登录 - 实验过程管理系统{% endblock %}
{% block content %}
<div class="login-shell card">
  <div class="page-header">
    <h2>欢迎登录</h2>
    <p>请先登录后再进行实验计划、任务与报告管理。</p>
  </div>
  <form method="post" class="form-grid">
    <input name="username" placeholder="请输入用户名" required />
    <input name="password" type="password" placeholder="请输入密码" required />
    <button type="submit">登录系统</button>
  </form>
  <p class="hint">还没有账号？<a href="{{ url_for('web.register') }}">点击注册</a></p>
</div>
{% endblock %}
