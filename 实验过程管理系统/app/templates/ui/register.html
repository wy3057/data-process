{% extends 'ui/base.html' %}
{% block title %}注册 - 实验过程管理系统{% endblock %}
{% block content %}
<div class="login-shell card">
  <div class="page-header">
    <h2>创建账号</h2>
    <p>注册后即可进入实验过程管理系统。</p>
  </div>
  <form method="post" class="form-grid">
    <input name="username" placeholder="请设置用户名" required />
    <input name="password" type="password" placeholder="请设置密码" required />
    <button type="submit">立即注册</button>
  </form>
  <p class="hint">已有账号？<a href="{{ url_for('web.login') }}">返回登录</a></p>
</div>
{% endblock %}
